[phases.setup]
nixPkgs = ["gdal", "geos", "proj", "python311"]
nixLibs = ["gdal", "geos", "proj"]

[phases.install]
cmds = [
    "python -m venv /opt/venv",
    "/opt/venv/bin/pip install --upgrade pip",
    "/opt/venv/bin/pip install -r requirements/production.txt",
]

[phases.build]
cmds = ["LD_LIBRARY_PATH=/root/.nix-profile/lib DJANGO_SETTINGS_MODULE=config.settings.build /opt/venv/bin/python manage.py collectstatic --noinput"]

[start]
cmd = "/opt/venv/bin/python manage.py migrate && /opt/venv/bin/gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
