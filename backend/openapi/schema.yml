openapi: 3.0.3
info:
  title: Terminal API
  version: v1
  description: Map-first B2B marketplace for hiring heavy assets in Nigeria.
paths:
  /api/v1/auth/email/resend:
    post:
      operationId: auth_email_resend_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailOtpResend'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailOtpResend'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailOtpResend'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailOtpResend'
          description: ''
  /api/v1/auth/email/verify:
    post:
      operationId: auth_email_verify_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailOtpVerify'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailOtpVerify'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailOtpVerify'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailOtpVerify'
          description: ''
  /api/v1/auth/login:
    post:
      operationId: auth_login_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
          description: ''
  /api/v1/auth/logout:
    post:
      operationId: auth_logout_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Logout'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Logout'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Logout'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Logout'
          description: ''
  /api/v1/auth/otp/resend:
    post:
      operationId: auth_otp_resend_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpResend'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OtpResend'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OtpResend'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpResend'
          description: ''
  /api/v1/auth/otp/verify:
    post:
      operationId: auth_otp_verify_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpVerify'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OtpVerify'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OtpVerify'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpVerify'
          description: ''
  /api/v1/auth/password-reset:
    post:
      operationId: auth_password_reset_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetRequest'
          description: ''
  /api/v1/auth/password-reset/confirm:
    post:
      operationId: auth_password_reset_confirm_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetConfirm'
          description: ''
  /api/v1/auth/register:
    post:
      operationId: auth_register_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Register'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Register'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Register'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
          description: ''
  /api/v1/auth/token/refresh:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TerminalTokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TerminalTokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TerminalTokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalTokenRefresh'
          description: ''
  /api/v1/listings:
    get:
      operationId: listings_retrieve
      tags:
      - listings
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Listing'
          description: ''
    post:
      operationId: listings_create
      tags:
      - listings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ListingCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ListingCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Listing'
          description: ''
  /api/v1/listings/{listing_id}:
    get:
      operationId: listings_retrieve_2
      parameters:
      - in: path
        name: listing_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - listings
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Listing'
          description: ''
    patch:
      operationId: listings_partial_update
      parameters:
      - in: path
        name: listing_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - listings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedListingUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedListingUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedListingUpdate'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Listing'
          description: ''
  /api/v1/me:
    get:
      operationId: me_retrieve
      tags:
      - me
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
          description: ''
    patch:
      operationId: me_partial_update
      tags:
      - me
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedMe'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedMe'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedMe'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
          description: ''
    delete:
      operationId: me_destroy
      tags:
      - me
      security:
      - jwtAuth: []
      responses:
        '204':
          description: Account soft-deleted.
  /api/v1/me/activate-supplier:
    post:
      operationId: me_activate_supplier_create
      tags:
      - me
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
          description: ''
  /api/v1/me/verification:
    get:
      operationId: me_verification_retrieve
      tags:
      - me
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationStatus'
          description: ''
    post:
      operationId: me_verification_create
      tags:
      - me
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerificationSubmit'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerificationSubmit'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationRequest'
          description: ''
  /api/v1/media/presign:
    post:
      operationId: media_presign_create
      tags:
      - media
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MediaPresign'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MediaPresign'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MediaPresign'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaPresignResponse'
          description: ''
  /api/v1/spec-templates:
    get:
      operationId: spec_templates_retrieve
      description: Public read of a spec template by class + type (latest version
        default).
      parameters:
      - in: query
        name: class
        schema:
          type: string
        required: true
      - in: query
        name: type
        schema:
          type: string
        required: true
      - in: query
        name: version
        schema:
          type: integer
      tags:
      - spec-templates
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpecTemplate'
          description: ''
  /api/v1/suppliers/me/profile:
    get:
      operationId: suppliers_me_profile_retrieve
      tags:
      - suppliers
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierProfile'
          description: ''
    patch:
      operationId: suppliers_me_profile_partial_update
      tags:
      - suppliers
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedSupplierProfile'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedSupplierProfile'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedSupplierProfile'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierProfile'
          description: ''
  /api/v1/yards:
    get:
      operationId: yards_retrieve
      tags:
      - yards
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Yard'
          description: ''
    post:
      operationId: yards_create
      tags:
      - yards
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Yard'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Yard'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Yard'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Yard'
          description: ''
  /api/v1/yards/{yard_id}:
    patch:
      operationId: yards_partial_update
      parameters:
      - in: path
        name: yard_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - yards
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedYard'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedYard'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedYard'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Yard'
          description: ''
    delete:
      operationId: yards_destroy
      parameters:
      - in: path
        name: yard_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - yards
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
components:
  schemas:
    AccountLevelEnum:
      enum:
      - basic
      - verified
      - business_verified
      type: string
      description: |-
        * `basic` - Basic
        * `verified` - Verified
        * `business_verified` - Business verified
    AssetClassEnum:
      enum:
      - plant_machinery
      - trucks_haulage
      - warehousing
      - terminals_yards
      - land_staging
      type: string
      description: |-
        * `plant_machinery` - Plant & Machinery
        * `trucks_haulage` - Trucks & Haulage
        * `warehousing` - Warehousing & Storage
        * `terminals_yards` - Terminals & Container Yards
        * `land_staging` - Land & Staging
    EmailOtpResend:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
      - email
    EmailOtpVerify:
      type: object
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          maxLength: 6
          minLength: 6
      required:
      - code
      - email
    KindEnum:
      enum:
      - identity
      - business
      type: string
      description: |-
        * `identity` - Identity
        * `business` - Business
    Listing:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        supplier_id:
          type: string
          format: uuid
          readOnly: true
        yard_id:
          type: string
          format: uuid
          nullable: true
          readOnly: true
        asset_class:
          allOf:
          - $ref: '#/components/schemas/AssetClassEnum'
          readOnly: true
        asset_type:
          type: string
          readOnly: true
        title:
          type: string
          readOnly: true
        description:
          type: string
          readOnly: true
        specs:
          readOnly: true
        spec_template_version:
          type: integer
          readOnly: true
        daily_price:
          type: integer
          readOnly: true
        weekly_price:
          type: integer
          readOnly: true
          nullable: true
        monthly_price:
          type: integer
          readOnly: true
          nullable: true
        daily_price_display:
          type: string
          nullable: true
          readOnly: true
        weekly_price_display:
          type: string
          nullable: true
          readOnly: true
        monthly_price_display:
          type: string
          nullable: true
          readOnly: true
        unit_count:
          type: integer
          readOnly: true
        units:
          type: array
          items:
            $ref: '#/components/schemas/Unit'
          readOnly: true
        point:
          type: object
          properties:
            type:
              type: string
              enum:
              - Point
            coordinates:
              type: array
              items:
                type: number
                format: float
              example:
              - 12.9721
              - 77.5933
              minItems: 2
              maxItems: 3
        address_text:
          type: string
          readOnly: true
        city:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        tier:
          allOf:
          - $ref: '#/components/schemas/TierEnum'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - address_text
      - asset_class
      - asset_type
      - city
      - created_at
      - daily_price
      - daily_price_display
      - description
      - id
      - monthly_price
      - monthly_price_display
      - point
      - spec_template_version
      - specs
      - status
      - supplier_id
      - tier
      - title
      - unit_count
      - units
      - updated_at
      - weekly_price
      - weekly_price_display
      - yard_id
    ListingCreate:
      type: object
      properties:
        asset_class:
          $ref: '#/components/schemas/AssetClassEnum'
        asset_type:
          type: string
          maxLength: 100
        title:
          type: string
          maxLength: 120
        description:
          type: string
          minLength: 50
        specs:
          type: object
          additionalProperties: {}
        daily_price:
          type: integer
          minimum: 1
        weekly_price:
          type: integer
          minimum: 1
          nullable: true
        monthly_price:
          type: integer
          minimum: 1
          nullable: true
        unit_count:
          type: integer
          minimum: 1
          default: 1
        yard_id:
          type: string
          format: uuid
          nullable: true
        point:
          nullable: true
        address_text:
          type: string
          default: ''
          maxLength: 300
        city:
          type: string
          default: ''
          maxLength: 120
        unit_labels:
          type: array
          items:
            type: string
            maxLength: 120
      required:
      - asset_class
      - asset_type
      - daily_price
      - description
      - title
    Login:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    Logout:
      type: object
      properties:
        refresh:
          type: string
      required:
      - refresh
    Me:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        full_name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
          readOnly: true
        phone:
          type: string
          readOnly: true
        is_supplier:
          type: boolean
          readOnly: true
        is_hirer:
          type: boolean
          readOnly: true
        account_level:
          allOf:
          - $ref: '#/components/schemas/AccountLevelEnum'
          readOnly: true
        is_phone_verified:
          type: boolean
          readOnly: true
        is_email_verified:
          type: boolean
          readOnly: true
        is_verified:
          type: boolean
          readOnly: true
      required:
      - account_level
      - email
      - full_name
      - id
      - is_email_verified
      - is_hirer
      - is_phone_verified
      - is_supplier
      - is_verified
      - phone
    MediaKindEnum:
      enum:
      - avatar
      - handover_photo
      - listing_photo
      - logo
      - verification_doc
      type: string
      description: |-
        * `avatar` - avatar
        * `handover_photo` - handover_photo
        * `listing_photo` - listing_photo
        * `logo` - logo
        * `verification_doc` - verification_doc
    MediaPresign:
      type: object
      properties:
        kind:
          $ref: '#/components/schemas/MediaKindEnum'
        content_type:
          type: string
          maxLength: 128
        file_size:
          type: integer
          minimum: 1
      required:
      - content_type
      - file_size
      - kind
    MediaPresignResponse:
      type: object
      properties:
        key:
          type: string
        bucket:
          type: string
        presigned_put_url:
          type: string
        expires_in:
          type: integer
      required:
      - bucket
      - expires_in
      - key
      - presigned_put_url
    OtpResend:
      type: object
      properties:
        phone:
          type: string
      required:
      - phone
    OtpVerify:
      type: object
      properties:
        phone:
          type: string
        code:
          type: string
          maxLength: 6
          minLength: 6
      required:
      - code
      - phone
    PasswordResetConfirm:
      type: object
      properties:
        token:
          type: string
        new_password:
          type: string
          writeOnly: true
      required:
      - new_password
      - token
    PasswordResetRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
      - email
    PatchedListingUpdate:
      type: object
      properties:
        title:
          type: string
          maxLength: 120
        description:
          type: string
          minLength: 50
        specs:
          type: object
          additionalProperties: {}
        daily_price:
          type: integer
          minimum: 1
        weekly_price:
          type: integer
          minimum: 1
          nullable: true
        monthly_price:
          type: integer
          minimum: 1
          nullable: true
        unit_count:
          type: integer
          minimum: 1
        yard_id:
          type: string
          format: uuid
          nullable: true
        point:
          nullable: true
        address_text:
          type: string
          maxLength: 300
        city:
          type: string
          maxLength: 120
    PatchedMe:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        full_name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
          readOnly: true
        phone:
          type: string
          readOnly: true
        is_supplier:
          type: boolean
          readOnly: true
        is_hirer:
          type: boolean
