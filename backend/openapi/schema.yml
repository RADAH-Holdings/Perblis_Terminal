openapi: 3.0.3
info:
  title: Terminal API
  version: v1
  description: Map-first B2B marketplace for hiring heavy assets in Nigeria.
paths:
  /api/v1/auth/login:
    post:
      operationId: auth_login_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
          description: ''
  /api/v1/auth/logout:
    post:
      operationId: auth_logout_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Logout'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Logout'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Logout'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Logout'
          description: ''
  /api/v1/auth/otp/resend:
    post:
      operationId: auth_otp_resend_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpResend'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OtpResend'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OtpResend'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpResend'
          description: ''
  /api/v1/auth/otp/verify:
    post:
      operationId: auth_otp_verify_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpVerify'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OtpVerify'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OtpVerify'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpVerify'
          description: ''
  /api/v1/auth/password-reset:
    post:
      operationId: auth_password_reset_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetRequest'
          description: ''
  /api/v1/auth/password-reset/confirm:
    post:
      operationId: auth_password_reset_confirm_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetConfirm'
          description: ''
  /api/v1/auth/register:
    post:
      operationId: auth_register_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Register'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Register'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Register'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
          description: ''
  /api/v1/auth/token/refresh:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TerminalTokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TerminalTokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TerminalTokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalTokenRefresh'
          description: ''
  /api/v1/me:
    get:
      operationId: me_retrieve
      tags:
      - me
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
          description: ''
    patch:
      operationId: me_partial_update
      tags:
      - me
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedMe'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedMe'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedMe'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
          description: ''
    delete:
      operationId: me_destroy
      tags:
      - me
      security:
      - jwtAuth: []
      responses:
        '204':
          description: Account soft-deleted.
  /api/v1/me/activate-supplier:
    post:
      operationId: me_activate_supplier_create
      tags:
      - me
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
          description: ''
  /api/v1/me/verification:
    get:
      operationId: me_verification_retrieve
      tags:
      - me
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationStatus'
          description: ''
    post:
      operationId: me_verification_create
      tags:
      - me
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerificationSubmit'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerificationSubmit'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationRequest'
          description: ''
components:
  schemas:
    AccountLevelEnum:
      enum:
      - basic
      - verified
      - business_verified
      type: string
      description: |-
        * `basic` - Basic
        * `verified` - Verified
        * `business_verified` - Business verified
    KindEnum:
      enum:
      - identity
      - business
      type: string
      description: |-
        * `identity` - Identity
        * `business` - Business
    Login:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    Logout:
      type: object
      properties:
        refresh:
          type: string
      required:
      - refresh
    Me:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        full_name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
          readOnly: true
        phone:
          type: string
          readOnly: true
        is_supplier:
          type: boolean
          readOnly: true
        is_hirer:
          type: boolean
          readOnly: true
        account_level:
          allOf:
          - $ref: '#/components/schemas/AccountLevelEnum'
          readOnly: true
        is_phone_verified:
          type: boolean
          readOnly: true
        is_verified:
          type: boolean
          readOnly: true
      required:
      - account_level
      - email
      - full_name
      - id
      - is_hirer
      - is_phone_verified
      - is_supplier
      - is_verified
      - phone
    OtpResend:
      type: object
      properties:
        phone:
          type: string
      required:
      - phone
    OtpVerify:
      type: object
      properties:
        phone:
          type: string
        code:
          type: string
          maxLength: 6
          minLength: 6
      required:
      - code
      - phone
    PasswordResetConfirm:
      type: object
      properties:
        token:
          type: string
        new_password:
          type: string
          writeOnly: true
      required:
      - new_password
      - token
    PasswordResetRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
      - email
    PatchedMe:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        full_name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
          readOnly: true
        phone:
          type: string
          readOnly: true
        is_supplier:
          type: boolean
          readOnly: true
        is_hirer:
          type: boolean
          readOnly: true
        account_level:
          allOf:
          - $ref: '#/components/schemas/AccountLevelEnum'
          readOnly: true
        is_phone_verified:
          type: boolean
          readOnly: true
        is_verified:
          type: boolean
          readOnly: true
    Register:
      type: object
      properties:
        full_name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
        phone:
          type: string
          maxLength: 20
        password:
          type: string
          writeOnly: true
        accept_tos:
          type: boolean
        accept_privacy:
          type: boolean
      required:
      - accept_privacy
      - accept_tos
      - email
      - full_name
      - password
      - phone
    StateEnum:
      enum:
      - pending
      - approved
      - rejected
      type: string
      description: |-
        * `pending` - Pending
        * `approved` - Approved
        * `rejected` - Rejected
    TerminalTokenRefresh:
      type: object
      description: |-
        Refresh that re-validates the account.

        simplejwt's default refresh trusts the refresh token without a DB lookup, so
        a suspended or soft-deleted user — or one whose sessions were invalidated by
        a token_version bump — could keep rotating tokens for up to 7 days. We
        re-load the user and re-apply the guards before issuing anything.
      properties:
        refresh:
          type: string
        access:
          type: string
          readOnly: true
      required:
      - access
      - refresh
    TokenPair:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - refresh
    VerificationRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        kind:
          allOf:
          - $ref: '#/components/schemas/KindEnum'
          readOnly: true
        state:
          allOf:
          - $ref: '#/components/schemas/StateEnum'
          readOnly: true
        reason:
          type: string
          readOnly: true
        rc_number:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        decided_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
      - created_at
      - decided_at
      - id
      - kind
      - rc_number
      - reason
      - state
    VerificationStatus:
      type: object
      properties:
        account_level:
          type: string
        requests:
          type: array
          items:
            $ref: '#/components/schemas/VerificationRequest'
      required:
      - account_level
      - requests
    VerificationSubmit:
      type: object
      properties:
        kind:
          $ref: '#/components/schemas/KindEnum'
        documents:
          type: array
          items:
            type: string
            format: uri
          maxItems: 5
        rc_number:
          type: string
          maxLength: 32
      required:
      - documents
      - kind
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
