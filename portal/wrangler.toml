# Cloudflare Workers config for the Supplier Portal (D-012).
# Built by @opennextjs/cloudflare; see DEPLOY.md for the deploy steps.
name = "terminal-portal"
main = ".open-next/worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

# Set the backend API origin per environment in the Cloudflare dashboard or
# via `vars` here once the API is deployed (Wave 0 deploy step).
# [vars]
# NEXT_PUBLIC_API_BASE_URL = "https://api.example.com/api/v1"
